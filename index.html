  .btn:hover { background: #1c1c1c; border-color: #3a3a3a; transform: translateY(-1px); }
  .btn-center { text-align: center; }
  
  .nav-btn { padding: 8px 16px; border: none; background: transparent; color: #777; cursor: pointer; font-size: 0.95rem; font-weight: 300; padding-left: 0; transition: color 0.2s ease; }
  .nav-btn:hover { color: #ccc; }
  
  .top-bar { margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
  
  .progress-bar { width: 100%; height: 3px; background: #262626; border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: #84a58b; width: 0%; transition: width 0.3s ease; }

  .card { 
    background: #151515; border: 1px solid #262626; border-radius: 16px; 
    padding: 80px 30px; text-align: center; cursor: pointer; 
    min-height: 320px; display: flex; flex-direction: column; justify-content: center; align-items: center; 
    transition: background 0.2s ease; box-shadow: 0 10px 40px rgba(0,0,0,0.6); position: relative;
  }
  .card:hover { background: #181818; }

  .jp-kana { font-size: 1.1rem; color: #ccc; margin-bottom: 4px; font-family: sans-serif; }
  .jp-romaji { font-size: 1rem; color: #888; font-style: italic; }

  .action-btn:active { transform: scale(0.98); }
  .action-btn:hover { background: #fff; }

  .control-btn { padding: 14px 28px; border: 1px solid #262626; border-radius: 10px; background: #151515; color: #eaeaea; cursor: pointer; transition: background 0.2s ease; font-weight: 300; }

  .cat-btn:hover { background: #1c1c1c; border-color: #3a3a3a; }

  .phrase-item { display: block; width: 100%; text-align: left; background: none; border: none; color: #888; padding: 12px 14px; cursor: pointer; font-size: 0.95rem; border-radius: 8px; transition: color 0.2s ease, background 0.2s ease; font-weight: 300; }
  .phrase-item:hover { color: #fff; background: #151515; }

      flex: 1; 
      text-align: center; 
      padding: 18px 0; 
      font-size: 1rem;
    }

<div class="container">
  
  <div id="view-intro">
    <h1 class="brand-title">echo</h1>
    <p class="intro-text">my personal language library to help me learn the phrases and words <em>i</em> use every day.</p>
    <p class="intro-text" style="margin-bottom: 40px;">the audio is generated by my own audio generation apps: <a href="https://voix-kohl.vercel.app" target="_blank" class="text-link">voix</a> and <a href="https://koe-lake.vercel.app" target="_blank" class="text-link">koe</a></p>
    <button class="btn btn-center" id="btn-start" onclick="showLangs()">start</button>
  </div>

  <div id="view-langs">
    <div class="top-bar"><button class="nav-btn" onclick="showIntro()">‹ back</button></div>
    <h1>choose language</h1>
    <div id="lang-list"></div>
  </div>

  <div id="view-method">
    <div class="top-bar"><button class="nav-btn" onclick="showLangs()">‹ back</button></div>
    <h1>choose learning method</h1>
    <button class="btn" id="btn-mode-flash" onclick="setMode(`flash`)">flashcards</button>
    <button class="btn" id="btn-mode-listen" onclick="setMode(`listen`)">listen library</button>
  </div>

  <div id="view-cats">
    <div class="top-bar"><button class="nav-btn" onclick="showMethod()">‹ back</button></div>
    <div class="cat-header-wrapper">
      <h1>categories</h1>
      <button id="btn-study-selected" class="action-btn">study selected</button>
    </div>
    <div id="cat-list"></div>
  </div>

  <div id="view-card">
    <div class="top-bar">
      <button class="nav-btn" id="btn-back-card">‹ back</button>
      <span id="card-counter" class="nav-btn" style="cursor: default; color: #555;"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="card" id="flashcard">
      <div id="card-display">
        <div id="card-eng" class="eng-text"></div>
        <div id="card-target" class="target-text"></div>
      </div>
      <div id="card-audio-container" style="display: flex; gap: 10px;"></div>
    </div>
    <div class="controls" id="card-controls">
      <button id="btn-prev" class="control-btn">previous</button>
      <button id="btn-next" class="control-btn">next</button>
    </div>
  </div>
</div>

let mode = ``;
let currentLang = ``;
let studyQueue = [];
let currentIndex = 0;
let audioObj = null;

function hideAll() {
  document.querySelectorAll(`.container > div`).forEach(d => d.style.display = `none`);
  if (audioObj) audioObj.pause();
}

function showIntro() {
  hideAll();
  document.getElementById(`view-intro`).style.display = `block`;
}

function showLangs() {
  hideAll();
  document.getElementById(`view-langs`).style.display = `block`;
  const langList = document.getElementById(`lang-list`);
  langList.innerHTML = ``;
  for (const lang in library) {
    const btn = document.createElement(`button`);
    btn.className = `btn`;
    btn.textContent = lang;
    btn.onclick = () => { currentLang = lang; showMethod(); };
    langList.appendChild(btn);
  }
}

function showMethod() {
  hideAll();
  document.getElementById(`view-method`).style.display = `block`;
}

function setMode(selectedMode) {
  mode = selectedMode;
  showCats();
}

function showCats() {
  hideAll();
  document.getElementById(`view-cats`).style.display = `block`;
  const catList = document.getElementById(`cat-list`);
  catList.innerHTML = ``;
  
  for (const cat in library[currentLang]) {
    const catDiv = document.createElement(`div`);
    catDiv.className = `cat-container`;
    
    const headerRow = document.createElement(`div`);
    headerRow.className = `cat-header-row`;
    
    const checkbox = document.createElement(`input`);
    checkbox.type = `checkbox`;
    checkbox.className = `cat-checkbox`;
    checkbox.value = cat;
    
    const catBtn = document.createElement(`button`);
    catBtn.className = `cat-btn`;
    catBtn.textContent = cat;
    
    headerRow.appendChild(checkbox);
    headerRow.appendChild(catBtn);
    
    const phraseList = document.createElement(`div`);
    phraseList.className = `phrase-list`;
    
    library[currentLang][cat].forEach((item, idx) => {
      const pBtn = document.createElement(`button`);
      pBtn.className = `phrase-item`;
      pBtn.textContent = item.eng;
      pBtn.onclick = () => {
        studyQueue = [...library[currentLang][cat]];
        currentIndex = idx;
        showCard();
      };
      phraseList.appendChild(pBtn);
    });
    
    catBtn.onclick = () => {
      phraseList.style.display = phraseList.style.display === `block` ? `none` : `block`;
    };
    
    catDiv.appendChild(headerRow);
    catDiv.appendChild(phraseList);
    catList.appendChild(catDiv);
  }
}

document.getElementById(`btn-study-selected`).onclick = () => {
  const selected = document.querySelectorAll(`.cat-checkbox:checked`);
  if (selected.length === 0) return;
  let combined = [];
  selected.forEach(cb => combined = combined.concat(library[currentLang][cb.value]));
  studyQueue = combined.sort(() => Math.random() - 0.5);
  currentIndex = 0;
  showCard();
};

const flashcard = document.getElementById(`flashcard`);
const targetDiv = document.getElementById(`card-target`);
const audioContainer = document.getElementById(`card-audio-container`);
const controls = document.getElementById(`card-controls`);
const progressFill = document.getElementById(`progress-fill`);

function updateProgress() {
  if (studyQueue.length === 0) return;
  const pct = ((currentIndex + 1) / studyQueue.length) * 100;
  progressFill.style.width = `${pct}%`;
}

function playAudio(path) {
  if (path) {
    if (audioObj) audioObj.pause();
    audioObj = new Audio(path);
    audioObj.play();
  }
}

function showCard() {
  hideAll();
  document.getElementById(`view-card`).style.display = `block`;
  
  if (studyQueue.length === 0) return showIntro();
  
  const item = studyQueue[currentIndex];
  document.getElementById(`card-eng`).textContent = item.eng;
  document.getElementById(`card-counter`).textContent = `${currentIndex + 1} / ${studyQueue.length}`;
  
  targetDiv.innerHTML = ``;
  audioContainer.innerHTML = ``;
  
  if (currentLang === `japanese`) {
    let html = ``;
    if (item.casual) {
      html += `<div class="jp-section">
                <div class="jp-label">casual</div>
                <div class="jp-kanji">${item.casual.kanji}</div>
                <div class="jp-kana">${item.casual.kana}</div>
                <div class="jp-romaji">${item.casual.romaji}</div>
               </div>`;
      let btn = document.createElement(`button`);
      btn.className = `action-btn`;
      btn.textContent = `play casual`;
      btn.onclick = (e) => { e.stopPropagation(); playAudio(item.audioCasual); };
      audioContainer.appendChild(btn);
    }
    if (item.polite) {
      html += `<div class="jp-section">
                <div class="jp-label">polite</div>
                <div class="jp-kanji">${item.polite.kanji}</div>
                <div class="jp-kana">${item.polite.kana}</div>
                <div class="jp-romaji">${item.polite.romaji}</div>
               </div>`;
      let btn = document.createElement(`button`);
      btn.className = `action-btn`;
      btn.textContent = `play polite`;
      btn.onclick = (e) => { e.stopPropagation(); playAudio(item.audioPolite); };
      audioContainer.appendChild(btn);
    }
    targetDiv.innerHTML = html;
  } else {
    targetDiv.textContent = item.target;
    let btn = document.createElement(`button`);
    btn.className = `action-btn`;
    btn.textContent = `play audio`;
    btn.onclick = (e) => { e.stopPropagation(); playAudio(item.audio); };
    audioContainer.appendChild(btn);
  }

  updateProgress();
  controls.style.display = studyQueue.length > 1 ? `flex` : `none`;
  
  if (mode === `flash`) {
    targetDiv.style.display = `none`;
    audioContainer.style.display = `none`;
    flashcard.style.cursor = `pointer`;
  } else {
    targetDiv.style.display = `block`;
    audioContainer.style.display = `flex`;
    flashcard.style.cursor = `default`;
  }
}

flashcard.onclick = (e) => {
  if (e.target.tagName === `BUTTON` || e.target.tagName === `INPUT`) return;
  if (mode === `flash`) {
    if (targetDiv.style.display === `none`) {
      targetDiv.style.display = `block`;
      audioContainer.style.display = `flex`;
    } else {
      targetDiv.style.display = `none`;
      audioContainer.style.display = `none`;
    }
  }
};

document.getElementById(`btn-next`).onclick = () => { if (currentIndex < studyQueue.length - 1) { currentIndex++; showCard(); } };
document.getElementById(`btn-prev`).onclick = () => { if (currentIndex > 0) { currentIndex--; showCard(); } };

document.getElementById(`btn-back-card`).onclick = () => {
  showCats();
};
</script>
